name = "ainews-mod8-test"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = "src/index.ts"

[observability]
enabled = true

# Every 12 hours (00:00 and 12:00 UTC). Wall-clock duration per invocation is
# capped at 15 minutes by Cloudflare regardless of plan - see
# SUMMARIZATION_BUDGET_MS and HN_DISCOVERY_LIMIT in the ingestion module for
# how the pipeline stays within that.
[triggers]
crons = ["0 */12 * * *"]

# Publisher logo storage (replaces the old app's public/logos/publishers/
# disk writes, which are impossible in Workers - see publisherRegistry.ts).
# This binding also works against a local-simulated bucket under
# `wrangler dev` with no setup at all. bucket_name below is a real bucket on
# Nandika's personal Cloudflare test account (nandika.g2@gmail.com) - created
# manually via the dashboard since a brand-new account needs R2 enabled
# there first (one-time, account-owner-only step; `wrangler r2 bucket
# create` can't do it). Isolated test infra, unrelated to the shared team
# account.
[[r2_buckets]]
binding = "LOGO_BUCKET"
bucket_name = "ainews-test-logos"
